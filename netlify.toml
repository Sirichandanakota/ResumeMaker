[build]
  base = "FRONTEND"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_OPTIONS = "--max_old_space_size=4096"
  NODE_ENV = "production"
  VITE_API_URL = "https://resume-maker-backend.onrender.com"

[[redirects]]
  from = "/api/*"
  to = "https://resume-maker-backend.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
