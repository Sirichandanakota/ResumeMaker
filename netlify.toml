[build]
  base = "client"
  publish = "dist"
  command = "npm run build"

[build.environment]
  VITE_API_URL = "https://resumemaker-dmtr.onrender.com/api"

[[redirects]]
  from = "/api/*"
  to = "https://resumemaker-dmtr.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
